<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Bản sao sách - Quản Lý Thư Viện</title>
    
    <!-- Thêm Phông chữ và Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">


    
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <i class='bx bxs-library'></i> Thư Viện ĐH
            </div>
            <ul class="nav-links">
                <li><a href="/dashboard.html" class="nav-link "><i class='bx bxs-dashboard'></i> Dashboard</a></li>
                <li><a href="/readers.html" class="nav-link "><i class='bx bxs-group'></i> Độc giả</a></li>
                <li><a href="/categories.html" class="nav-link "><i class='bx bxs-category'></i> Thể loại</a></li>
                <li><a href="/titles.html" class="nav-link "><i class='bx bxs-book'></i> Đầu sách</a></li>
                <li><a href="/copies.html" class="nav-link active"><i class='bx bxs-copy-alt'></i> Bản sao</a></li>
                <li><a href="/borrow.html" class="nav-link "><i class='bx bx-transfer'></i> Mượn / Trả sách</a></li>
                <li><a href="/reports.html" class="nav-link "><i class='bx bxs-bar-chart-alt-2'></i> Báo cáo</a></li>
                <li id="adminMenu"><a href="/users.html" class="nav-link "><i class='bx bxs-user-circle'></i> Nhân viên</a></li>
            </ul>
            <div class="logout-btn">
                <div id="usernameDisplay" style="margin-bottom: 12px; font-weight: 700; color: var(--primary); text-align: center;"></div>
                <button id="logoutBtn" class="btn btn-danger" style="width: 100%;"><i class='bx bx-log-out'></i> Đăng Xuất</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content glass">
            <div class="page-header">
                <h1 class="page-title">Quản lý Bản sao (Cuốn sách)</h1>
                <button class="btn btn-primary" onclick="openModal()">+ Thêm Bản sao nhập mới</button>
            </div>

            <div class="table-container glass">
                <table>
                    <thead>
                        <tr>
                            <th>Mã Cuốn (Copy ID)</th>
                            <th>Tên Đầu Sách</th>
                            <th>Ngày Nhập</th>
                            <th>Tình Trạng</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable">
                        <!-- Data injected by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="formModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Thêm Bản sao mới</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="dataForm">
                <div class="form-group" id="titleGroup">
                    <label class="form-label" for="titleId">Đầu Sách</label>
                    <select id="titleId" class="form-control">
                        <!-- Options injected by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="status">Tình Trạng</label>
                    <select id="status" class="form-control">
                        <option value="">Chọn tình trạng</option>
                        <option value="available">Khả dụng (Sẵn sàng cho mượn)</option>
                        <option value="lost">Bị mất / Hỏng</option>
                    </select>
                </div>
                <!-- ID is implicitly meant for Update only, for Create we need Title ID -->
                <input type="hidden" id="copyId">
                <div class="flex-gap mt-4">
                    <button type="button" class="btn" style="background:#e5e7eb; color:var(--text-main);" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setupLayout();
            loadTitles();
            loadData();
        });

        const modal = document.getElementById('formModal');
        const form = document.getElementById('dataForm');
        let isEdit = false;

        async function loadTitles() {
            try {
                const titles = await apiFetch('/titles');
                const select = document.getElementById('titleId');
                select.innerHTML = '<option value="">Chọn Đầu sách</option>';
                titles.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    opt.textContent = t.title_name + ' (' + (t.author||'') + ')';
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function loadData() {
            try {
                const data = await apiFetch('/copies');
                const tbody = document.getElementById('dataTable');
                tbody.innerHTML = '';
                
                data.forEach((item, index) => {
                    let badgeClass = 'badge-success';
                    let statusText = 'Khả dụng';
                    if (item.status === 'borrowed') {
                        badgeClass = 'badge-warning';
                        statusText = 'Đang mượn';
                    } else if (item.status === 'lost') {
                        badgeClass = 'badge-danger';
                        statusText = 'Mất/Hỏng';
                    }

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${item.id}</strong></td>
                        <td style="color: var(--primary);">${item.title_name}</td>
                        <td>${formatDate(item.import_date)}</td>
                        <td><span class="badge ${badgeClass}">${statusText}</span></td>
                        <td class="action-btns">
                            <button class="btn btn-sm btn-primary" ${item.status === 'borrowed' ? 'disabled' : ''} onclick='editItem(${JSON.stringify(item)})'>Sửa trạng thái</button>
                            <button class="btn btn-sm btn-danger" ${item.status === 'borrowed' ? 'disabled' : ''} onclick="deleteItem(${item.id})">Xóa</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                alert('Lỗi tải dữ liệu: ' + err.message);
            }
        }

        function openModal() {
            isEdit = false;
            document.getElementById('modalTitle').textContent = 'Thêm Bản sao (nhập kho)';
            form.reset();
            document.getElementById('copyId').value = '';
            document.getElementById('titleGroup').style.display = 'block';
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function editItem(item) {
            isEdit = true;
            document.getElementById('modalTitle').textContent = 'Cập nhật Trạng thái Cuốn sách';
            document.getElementById('copyId').value = item.id;
            document.getElementById('titleGroup').style.display = 'none'; // Cannot change title of a physical copy
            document.getElementById('status').value = item.status;
            modal.classList.add('active');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const rules = {
                status: { required: true, message: 'Vui lòng chọn tình trạng' }
            };
            if (!isEdit) {
                rules.titleId = { required: true, message: 'Vui lòng chọn Đầu sách' };
            }
            if (!validateForm(rules)) return;

            const id = document.getElementById('copyId').value;
            const status = document.getElementById('status').value;

            try {
                if (isEdit) {
                    await apiFetch(`/copies/${id}`, 'PUT', { status });
                    
                } else {
                    const title_id = document.getElementById('titleId').value;
                    const import_date = new Date().toISOString().split('T')[0];
                    await apiFetch('/copies', 'POST', { title_id, status, import_date });
                    
                }
                closeModal();
                loadData();
            } catch (err) {
                alert('Lỗi: ' + err.message);
            }
        });

        async function deleteItem(id) {
            showConfirm('Xác nhận', 'Bạn có chắc chắn muốn xóa bản sao này? Hành động này sẽ giảm số lượng trong Đầu sách.', async () => {
                try {
                    await apiFetch(`/copies/${id}`, 'DELETE');
                    loadData();
                } catch (err) {
                    alert('Lỗi: ' + err.message);
                }
            });
        }
    </script>

    
</body>
</html>

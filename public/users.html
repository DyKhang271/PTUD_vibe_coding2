<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Nhân Viên - Quản Lý Thư Viện</title>
    
    <!-- Thêm Phông chữ và Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">


    
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <i class='bx bxs-library'></i> Thư Viện ĐH
            </div>
            <ul class="nav-links">
                <li><a href="/dashboard.html" class="nav-link "><i class='bx bxs-dashboard'></i> Dashboard</a></li>
                <li><a href="/readers.html" class="nav-link "><i class='bx bxs-group'></i> Độc giả</a></li>
                <li><a href="/categories.html" class="nav-link "><i class='bx bxs-category'></i> Thể loại</a></li>
                <li><a href="/titles.html" class="nav-link "><i class='bx bxs-book'></i> Đầu sách</a></li>
                <li><a href="/copies.html" class="nav-link "><i class='bx bxs-copy-alt'></i> Bản sao</a></li>
                <li><a href="/borrow.html" class="nav-link "><i class='bx bx-transfer'></i> Mượn / Trả sách</a></li>
                <li><a href="/reports.html" class="nav-link "><i class='bx bxs-bar-chart-alt-2'></i> Báo cáo</a></li>
                <li id="adminMenu"><a href="/users.html" class="nav-link active"><i class='bx bxs-user-circle'></i> Nhân viên</a></li>
            </ul>
            <div class="logout-btn">
                <div id="usernameDisplay" style="margin-bottom: 12px; font-weight: 700; color: var(--primary); text-align: center;"></div>
                <button id="logoutBtn" class="btn btn-danger" style="width: 100%;"><i class='bx bx-log-out'></i> Đăng Xuất</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content glass">
            <div class="page-header">
                <h1 class="page-title">Quản lý Nhân Viên (Admin / Thủ thư)</h1>
                <button class="btn btn-primary" onclick="openModal()">+ Thêm Nhân Viên</button>
            </div>

            <div class="table-container glass">
                <table>
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Tên Đăng Nhập</th>
                            <th>Vai Trò</th>
                            <th>Hành Động</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="formModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Thêm Nhân Viên</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="dataForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label class="form-label" for="txtUsername">Tên đăng nhập</label>
                    <input type="text" id="txtUsername" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label" for="txtPassword">Mật khẩu</label>
                    <input type="password" id="txtPassword" class="form-control" placeholder="(Bỏ trống nếu không đổi mật khẩu lúc sửa)">
                </div>
                <div class="form-group">
                    <label class="form-label" for="role">Vai Trò</label>
                    <select id="role" class="form-control">
                        <option value="librarian">Thủ thư</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                
                <div class="flex-gap mt-4">
                    <button type="button" class="btn" style="background:#e5e7eb; color:var(--text-main);" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = checkAuth();
            if (user && user.role !== 'admin') {
                alert('Tài khoản của bạn không có quyền truy cập trang này!');
                window.location.href = '/dashboard.html';
                return;
            }
            setupLayout();
            loadData();
        });

        const modal = document.getElementById('formModal');
        const form = document.getElementById('dataForm');
        let isEdit = false;

        async function loadData() {
            try {
                const data = await apiFetch('/users');
                const tbody = document.getElementById('dataTable');
                tbody.innerHTML = '';
                
                data.forEach((item, index) => {
                    const badgeClass = item.role === 'admin' ? 'badge-primary' : 'badge-success';
                    const roleText = item.role === 'admin' ? 'Admin' : 'Thủ thư';
                    const style = item.role === 'admin' ? 'background:#e0e7ff; color:var(--primary);' : 'background:#d1fae5; color:#065f46;';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td style="font-weight: 500;">${item.username}</td>
                        <td><span class="badge" style="${style}">${roleText}</span></td>
                        <td class="action-btns">
                            <button class="btn btn-sm btn-primary" onclick='editItem(${JSON.stringify(item).replace(/'/g, "&#39;")})'>Sửa</button>
                            ${item.username !== 'admin' ? `<button class="btn btn-sm btn-danger" onclick="deleteItem(${item.id})">Xóa</button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                alert('Lỗi tải dữ liệu: ' + err.message);
            }
        }

        function openModal() {
            isEdit = false;
            document.getElementById('modalTitle').textContent = 'Thêm Nhân Viên';
            form.reset();
            document.getElementById('userId').value = '';
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function editItem(item) {
            isEdit = true;
            document.getElementById('modalTitle').textContent = 'Sửa Nhân Viên';
            document.getElementById('userId').value = item.id;
            document.getElementById('txtUsername').value = item.username;
            document.getElementById('role').value = item.role;
            document.getElementById('txtPassword').value = '';
            modal.classList.add('active');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const rules = {
                txtUsername: { required: true, message: 'Vui lòng nhập tên đăng nhập' },
                role: { required: true, message: 'Vui lòng chọn vai trò' }
            };
            if (!isEdit) {
                rules.txtPassword = { required: true, message: 'Vui lòng nhập mật khẩu' };
            }
            
            if (!validateForm(rules)) return;

            const id = document.getElementById('userId').value;
            const pd = document.getElementById('txtPassword').value;
            const body = {
                username: document.getElementById('txtUsername').value,
                role: document.getElementById('role').value
            };
            if (pd) body.password = pd;

            try {
                if (isEdit) {
                    await apiFetch(`/users/${id}`, 'PUT', body);
                    
                } else {
                    await apiFetch('/users', 'POST', body);
                    
                }
                closeModal();
                loadData();
            } catch (err) {
                alert('Lỗi: ' + err.message);
            }
        });

        async function deleteItem(id) {
            showConfirm('Xác nhận', 'Bạn có chắc chắn muốn xóa nhân viên này?', async () => {
                try {
                    await apiFetch(`/users/${id}`, 'DELETE');
                    loadData();
                } catch (err) {
                    alert('Lỗi: ' + err.message);
                }
            });
        }
    </script>

    
</body>
</html>

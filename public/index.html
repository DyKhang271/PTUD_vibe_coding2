<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản Lý Thư Viện</title>
    
    <!-- Thêm Phông chữ và Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">


    
</head>
<body>
    <div class="auth-container">
        <div class="card glass">
            <h1 class="card-title">Hệ Thống Thư Viện</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-control" required placeholder="Nhập tên đăng nhập">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" required placeholder="Nhập mật khẩu">
                </div>
                <div id="errorMsg" class="form-group" style="color: var(--danger); font-size: 0.875rem; display: none;"></div>
                <button type="submit" class="btn btn-primary">Đăng nhập</button>
            </form>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        // Nếu đã đăng nhập thì tự động chuyển hướng
        if (localStorage.getItem('library_user')) {
            window.location.href = '/dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const data = await apiFetch('/auth/login', 'POST', { username, password });
                // Lưu user info
                localStorage.setItem('library_user', JSON.stringify(data.user));
                window.location.href = '/dashboard.html';
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>

    
</body>
</html>
